<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="せどり仕入れ時に使える粗利、粗利率、損益分岐点の計算アプリ"
    />
    <title>せどり粗利計算</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="header-panel" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">BUYING CHECK</p>
          <h1 id="app-title">せどり粗利計算</h1>
        </div>
        <div class="status-pill" id="statusPill">入力待ち</div>
      </section>

      <form class="calculator" id="calculator" autocomplete="off">
        <section class="input-panel" aria-label="計算入力">
          <label class="money-field">
            <span>仕入れ値</span>
            <span class="input-wrap">
              <span class="currency">¥</span>
              <input
                id="costInput"
                name="cost"
                type="text"
                inputmode="numeric"
                pattern="[0-9,]*"
                placeholder="0"
                aria-describedby="costHint"
              />
            </span>
          </label>
          <p class="field-note" id="costHint">商品を買う金額</p>

          <label class="money-field">
            <span>売値</span>
            <span class="input-wrap">
              <span class="currency">¥</span>
              <input
                id="priceInput"
                name="price"
                type="text"
                inputmode="numeric"
                pattern="[0-9,]*"
                placeholder="0"
              />
            </span>
          </label>

          <label class="money-field">
            <span>送料</span>
            <span class="input-wrap">
              <span class="currency">¥</span>
              <input
                id="shippingInput"
                name="shipping"
                type="text"
                inputmode="numeric"
                pattern="[0-9,]*"
                placeholder="0"
              />
            </span>
          </label>

          <div class="actions">
            <button class="icon-button" type="button" id="clearButton" aria-label="入力を消す" title="入力を消す">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="m19 6-1 14H6L5 6" />
                <path d="M10 11v5" />
                <path d="M14 11v5" />
              </svg>
            </button>
            <button class="icon-button" type="button" id="shareButton" aria-label="結果を共有" title="結果を共有">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <path d="m8.6 13.5 6.8 4" />
                <path d="m15.4 6.5-6.8 4" />
              </svg>
            </button>
          </div>
        </section>

        <section class="result-panel" aria-live="polite">
          <div class="hero-result" id="profitCard">
            <span class="result-label">粗利</span>
            <strong id="profitValue">¥0</strong>
            <span class="result-sub" id="profitMessage">仕入れ値、売値、送料を入力</span>
          </div>

          <div class="metric-grid">
            <article class="metric">
              <span>粗利率</span>
              <strong id="marginRate">0.0%</strong>
            </article>
            <article class="metric">
              <span>損益分岐売値</span>
              <strong id="breakEvenPrice">¥0</strong>
            </article>
            <article class="metric">
              <span>売値との差</span>
              <strong id="breakEvenGap">¥0</strong>
            </article>
            <article class="metric">
              <span>仕入れ上限</span>
              <strong id="maxCost">¥0</strong>
            </article>
          </div>
        </section>
      </form>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
