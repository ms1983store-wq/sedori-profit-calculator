<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4f39f6" />
    <meta
      name="description"
      content="保存した粗利計算を月別カレンダーで確認できます。"
    />
    <title>概算 粗利計算</title>
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="../styles.css?v=14" />
  </head>
  <body data-page="calendar">
    <main class="calendar-shell">
      <div class="container">
        <div class="calendar-sticky">
          <header class="topbar">
            <h1>🗓 カレンダー</h1>
            <a class="nav-pill" href="../">🧮 計算にもどる</a>
          </header>

          <div class="month-nav">
            <button class="month-button" type="button" id="prevMonth">← 前月</button>
            <div class="month-title" id="monthTitle"></div>
            <button class="month-button" type="button" id="nextMonth">翌月 →</button>
          </div>

          <section class="calendar-card" aria-label="月別カレンダー">
            <div class="weekday-row" aria-hidden="true">
              <span>日</span>
              <span>月</span>
              <span>火</span>
              <span>水</span>
              <span>木</span>
              <span>金</span>
              <span>土</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
          </section>

          <div class="legend" aria-hidden="true">
            <span><i class="dot"></i>仕入</span>
            <span><i class="dot profit"></i>概算粗利</span>
          </div>
        </div>

        <section class="month-summary" aria-label="月の合計">
          <div>
            <span id="monthCountLabel">保存件数</span>
            <strong id="monthCount">0 件</strong>
          </div>
          <div>
            <span id="monthPurchaseLabel">仕入値合計</span>
            <strong id="monthPurchase">¥0</strong>
          </div>
          <div>
            <span id="monthProfitLabel">概算粗利</span>
            <strong id="monthProfit" class="muted-value">まだないよ</strong>
          </div>
        </section>

        <h2 class="section-title">日にちごとの一覧</h2>
        <ul class="day-list" id="dayList"></ul>

        <p class="privacy-note">記録はこの端末（ブラウザ）の中だけに保存されています。</p>
      </div>
    </main>

    <script src="../app.js?v=14" defer></script>
  </body>
</html>
