<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#116466" />
    <meta
      name="description"
      content="せどりの仕入れ、販売日、販売価格、損益分岐点、利益をまとめて管理できる在庫管理アプリ"
    />
    <title>せどり在庫帳</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=14" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">SEDORI LEDGER</p>
          <h1>せどり在庫帳</h1>
        </div>
        <div class="header-actions" aria-label="データ操作">
          <button class="icon-button" type="button" id="exportButton" aria-label="CSVを書き出す" title="CSVを書き出す">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M7 10l5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
          </button>
          <label class="icon-button file-action" aria-label="CSVを読み込む" title="CSVを読み込む">
            <input id="importInput" type="file" accept=".csv,text/csv" />
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M17 8l-5-5-5 5" />
              <path d="M12 3v12" />
            </svg>
          </label>
          <button class="icon-button" type="button" id="pasteImportButton" aria-label="CSVを貼り付ける" title="CSVを貼り付ける">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 4h1a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1" />
              <path d="M9 4a3 3 0 0 1 6 0v2H9Z" />
              <path d="M9 14h6" />
              <path d="M9 18h4" />
            </svg>
          </button>
        </div>
      </header>

      <nav class="app-tabs" aria-label="ページ切替">
        <button class="tab-button active" type="button" data-view-tab="top" aria-selected="true">トップ</button>
        <button class="tab-button" type="button" data-view-tab="entry" aria-selected="false">商品登録</button>
        <button class="tab-button" type="button" data-view-tab="inventory" aria-selected="false">在庫管理</button>
      </nav>

      <section class="view-panel active" id="topView" data-view-panel="top" aria-label="トップ">
        <section class="month-toolbar" aria-label="月別集計の対象月">
          <button class="icon-button subtle" type="button" id="previousMonthButton" aria-label="前の月" title="前の月">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
          <label class="month-field">
            <span>対象月</span>
            <input id="summaryMonthInput" type="month" />
          </label>
          <button class="icon-button subtle" type="button" id="nextMonthButton" aria-label="次の月" title="次の月">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 18 6-6-6-6" />
            </svg>
          </button>
        </section>

        <section class="summary-grid" aria-label="集計">
          <article class="summary-tile">
            <span>現在在庫数</span>
            <strong id="stockCount">0</strong>
          </article>
          <article class="summary-tile">
            <span>現在在庫原価</span>
            <strong id="stockCost">¥0</strong>
          </article>
          <article class="summary-tile">
            <span>月売上</span>
            <strong id="monthlySales">¥0</strong>
          </article>
          <article class="summary-tile">
            <span>月利益</span>
            <strong id="monthlyProfit">¥0</strong>
          </article>
        </section>

        <section class="month-detail-grid" aria-label="月別詳細">
          <article>
            <span>月販売数</span>
            <strong id="monthlySoldCount">0</strong>
          </article>
          <article>
            <span>月末在庫数</span>
            <strong id="monthEndStockCount">0</strong>
          </article>
          <article>
            <span>月原価</span>
            <strong id="monthlyCost">¥0</strong>
          </article>
          <article>
            <span>平均利益</span>
            <strong id="monthlyAverageProfit">¥0</strong>
          </article>
          <article>
            <span>ROI</span>
            <strong id="monthlyRoi">0.0%</strong>
          </article>
        </section>

        <section class="top-actions" aria-label="主要操作">
          <button class="nav-action" type="button" data-view-target="entry">商品登録</button>
          <button class="nav-action" type="button" data-view-target="inventory">在庫管理</button>
        </section>
      </section>

      <section class="view-panel" id="entryView" data-view-panel="entry" aria-label="商品登録" hidden>
        <form class="entry-panel" id="itemForm" autocomplete="off">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">ITEM</p>
              <h2 id="formTitle">商品登録</h2>
            </div>
            <button class="icon-button subtle" type="button" id="resetButton" aria-label="フォームを初期化" title="フォームを初期化">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7" />
                <path d="M3 4v5h5" />
              </svg>
            </button>
          </div>

          <input type="hidden" id="itemId" />

          <label class="field full">
            <span>商品名</span>
            <input id="nameInput" type="text" placeholder="例：Nintendo Switch 本体" required />
          </label>

          <div class="field-row">
            <label class="field">
              <span>販売先</span>
              <select id="marketInput">
                <option value="メルカリ">メルカリ</option>
                <option value="ラクマ">ラクマ</option>
                <option value="Yahoo!フリマ">Yahoo!フリマ</option>
                <option value="ヤフオク">ヤフオク</option>
                <option value="Amazon">Amazon</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label class="field">
              <span>状態</span>
              <select id="statusInput">
                <option value="在庫">在庫</option>
                <option value="売却済み">売却済み</option>
                <option value="出品前">出品前</option>
                <option value="出品中">出品中</option>
                <option value="発送準備">発送準備</option>
                <option value="評価待ち">評価待ち</option>
                <option value="完了">完了</option>
              </select>
            </label>
          </div>

          <div class="field-row date-grid">
            <label class="field">
              <span>仕入日</span>
              <input id="purchaseDateInput" type="date" />
            </label>
            <label class="field">
              <span>出品日</span>
              <input id="listingDateInput" type="date" />
            </label>
            <label class="field highlight-field">
              <span>販売日</span>
              <input id="saleDateInput" type="date" />
            </label>
          </div>

          <div class="money-grid">
            <label class="field">
              <span>仕入れ値</span>
              <span class="money-input">
                <span>¥</span>
                <input id="purchasePriceInput" type="text" inputmode="numeric" pattern="[0-9,]*" placeholder="0" required />
              </span>
            </label>
            <label class="field">
              <span>販売価格</span>
              <span class="money-input">
                <span>¥</span>
                <input id="salePriceInput" type="text" inputmode="numeric" pattern="[0-9,]*" placeholder="0" />
              </span>
            </label>
            <label class="field">
              <span>送料</span>
              <span class="money-input">
                <span>¥</span>
                <input id="shippingInput" type="text" inputmode="numeric" pattern="[0-9,]*" placeholder="0" />
              </span>
            </label>
            <label class="field">
              <span>梱包費</span>
              <span class="money-input">
                <span>¥</span>
                <input id="packingInput" type="text" inputmode="numeric" pattern="[0-9,]*" placeholder="0" />
              </span>
            </label>
          </div>

          <div class="field-row compact">
            <label class="field">
              <span>手数料率</span>
              <span class="rate-input">
                <input id="feeRateInput" type="number" min="0" max="80" step="0.1" value="10" />
                <span>%</span>
              </span>
            </label>
            <label class="field">
              <span>メモ</span>
              <input id="memoInput" type="text" placeholder="棚番・仕入れ先など" />
            </label>
          </div>

          <section class="calculation-strip" aria-live="polite">
            <article>
              <span>損益分岐点</span>
              <strong id="formBreakEven">¥0</strong>
            </article>
            <article>
              <span>利益</span>
              <strong id="formProfit">¥0</strong>
            </article>
            <article>
              <span>利益率</span>
              <strong id="formMargin">0.0%</strong>
            </article>
          </section>

          <button class="primary-button" type="submit" id="saveButton">保存</button>
        </form>
      </section>

      <section class="view-panel" id="inventoryView" data-view-panel="inventory" aria-label="在庫管理" hidden>
        <section class="inventory-panel" aria-labelledby="inventoryTitle">
          <div class="panel-heading inventory-heading">
            <div>
              <p class="section-kicker">INVENTORY</p>
              <h2 id="inventoryTitle">在庫一覧</h2>
            </div>
            <label class="search-field">
              <span class="sr-only">検索</span>
              <input id="searchInput" type="search" placeholder="商品名・メモ検索" />
            </label>
          </div>

          <div class="filter-row" id="statusFilters" aria-label="状態フィルター">
            <button type="button" class="filter-chip active" data-status="all">すべて</button>
            <button type="button" class="filter-chip" data-status="stock">在庫</button>
            <button type="button" class="filter-chip" data-status="売却済み">売却済み</button>
            <button type="button" class="filter-chip" data-status="出品前">出品前</button>
            <button type="button" class="filter-chip" data-status="発送準備">発送準備</button>
            <button type="button" class="filter-chip" data-status="評価待ち">評価待ち</button>
            <button type="button" class="filter-chip" data-status="完了">完了</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>商品</th>
                  <th>状態</th>
                  <th>仕入れ値</th>
                  <th>出品日</th>
                  <th>販売日</th>
                  <th>販売まで日数</th>
                  <th>販売価格</th>
                  <th>損益分岐点</th>
                  <th>利益</th>
                  <th>利益率</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="inventoryBody"></tbody>
            </table>
          </div>

          <p class="empty-state" id="emptyState">在庫を登録すると一覧に表示されます。</p>
        </section>
      </section>
    </main>

    <dialog class="paste-dialog" id="csvPasteDialog" aria-labelledby="pasteDialogTitle">
      <div class="dialog-panel">
        <div class="dialog-heading">
          <h2 id="pasteDialogTitle">CSV貼付</h2>
          <button class="icon-button tiny" type="button" id="closePasteDialogButton" aria-label="閉じる" title="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <textarea id="csvPasteInput" spellcheck="false" placeholder="CSVの内容を貼り付け"></textarea>
        <button class="primary-button" type="button" id="confirmPasteImportButton">読み込む</button>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./default-inventory.js?v=2" defer></script>
    <script src="./app.js?v=14" defer></script>
  </body>
</html>
